<!DOCTYPE html>
<html lang="pt-br">
  <head>
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Signup</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='login.css') }}"
    />

  </head>
  <body>
    <div class="container">

      {% if error %}
      <p style="color: red; text-align: center">{{ error }}</p>
      {% endif %}

      <div class="form-box login">
        <form method='POST' action='/inicio'>
          <input type="hidden" name="action" value="login">
          <h1>Entrar</h1>
          <div class="input-box">
            <input type="text" name="username" placeholder="Usuário" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="password" name="password" placeholder="Senha" required />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <div class="forgot-link">
            <a href="#">Esqueceu a senha?</a>
          </div>
          <button type="submit" class="btn" value="login">Entrar</button>
        </form>
      </div>
      
      <div class="form-box register">
        <form method="POST" action='/'>
          <input type="hidden" name="action" value="register">
          <h1>Registrar</h1>
          <div class="input-box">
            <input type="text" name="username" placeholder="Usuário" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="email" name='email' placeholder="Email" required />
            <i class="bx bxs-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" name="password" placeholder="Senha" required />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <button type="submit" class="btn" value="register">Registrar</button>
        </form>
      </div>

      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Olá, Seja bem-vindo!</h1>
          <p>Não possui conta?</p>
          <button class="btn register-btn">Registrar</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Bem-vindo de voltar!</h1>
          <p>Já possui uma conta?</p>
          <button class="btn login-btn">Entrar</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
  </body>
</html>
