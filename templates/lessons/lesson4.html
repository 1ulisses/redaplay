<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lição 4: Aula - Redaplay</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='main.css') }}"
    />
    <link
      rel="icon"
      href="{{ url_for('static', filename='favicon.png')}}"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="video-page-container">
      <h1>Lição 4: Aula</h1>
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/watch?v=dzLMxHjrS70&list=PLu0iY-hrkT12L3zJ2DQ14ug4ToFqUfaiL&index=3"
          title="Vídeo da Lição 4"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <p>Bem-vindo à sua quarta lição! Aprenda os fundamentos da escrita.</p>
      <p>Assista ao vídeo e prepare-se para a próxima etapa!</p>
      <button id="complete-lesson-1-btn" class="main-button">
        Concluir Lição 4
      </button>
      <a href="/inicio" class="back-button">Voltar para a Jornada</a>
    </div>

    <script>
      // comentários por Leandro
      document.addEventListener("DOMContentLoaded", () => { // espera DOM
        const completeBtn = document.getElementById("complete-lesson-1-btn"); // pega o botão
        if (completeBtn) { // verifica se o botão existe
          completeBtn.addEventListener("click", () => { // adiciona evento de clique
            fetch("/api/user/lessons_completed") // pega lições concluídas da api endpoint
              .then((res) => res.json()) // converte resposta para json
              .then((data) => {
                let completed = Array.isArray(data.lessons_completed) // verifica se é um array, se não for, cria um novo array
                  ? data.lessons_completed
                  : [];
                if (!completed.includes(4)) completed.push(4); // adiciona lição 4 se não estiver concluída, se estiver, não faz nada
                return fetch("/api/user/lessons_completed", { // envia lições concluídas para a api endpoint
                  method: "POST",
                  headers: { "Content-Type": "application/json" }, // cabeçalho da api endpoint
                  body: JSON.stringify({ lessons_completed: completed }), // lições concluídas para json
                });
              })
              .then(() => {
                window.location.href = "/inicio"; // redireciona para a página de início
              });
          });
        }
      });
    </script>
  </body>
</html>
