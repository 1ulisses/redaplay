<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Jornada de Aprendizagem</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Minha Jornada de Aprendizagem</h1>
        <div class="header-icons">
          <span class="icon">❤️ 5</span>
          <span class="icon">🏆 100</span>
        </div>
      </header>

      <div class="main-content">
        <nav class="sidebar">
          <ul>
            <li class="active">Unidade 1</li>
            <li>Unidade 2</li>
            <li>Unidade 3</li>
            <li>Unidade 4</li>
          </ul>
        </nav>

        <section class="unit-progress">
          <h2>Progresso da Unidade Atual</h2>
          <div class="lesson-list">
            <a
              href="/lesson1"
              class="lesson-item"
              data-id-lesson="1"
            >
              <span class="lesson-status" id="status-1"></span>
              <span class="lesson-title">Lição 1: Saudações</span>
            </a>
            <a
              href="lesson2.html"
              class="lesson-item disabled locked"
              data-id-lesson="2"
            >
              <span class="lesson-status" id="status-2"></span>
              <span class="lesson-title">Lição 2: Frases Básicas</span>
            </a>
            <a
              href="lesson3.html"
              class="lesson-item disabled locked"
              data-id-lesson="3"
            >
              <span class="lesson-status" id="status-3"></span>
              <span class="lesson-title">Lição 3: Apresentações</span>
            </a>
            <a
              href="lesson4.html"
              class="lesson-item disabled locked"
              data-id-lesson="4"
            >
              <span class="lesson-status" id="status-4"></span>
              <span class="lesson-title">Lição 4: Fazendo Perguntas</span>
            </a>
            <a
              href="lesson.html"
              class="lesson-item disabled locked"
              data-id-lesson="5"
            >
              <span class="lesson-status" id="status-5"></span>
              <span class="lesson-title">Lição 5: Membros da Família</span>
            </a>
          </div>
        </section>

        <aside class="challenges">
          <h2>Desafios</h2>
          <div class="challenge-item">Desafio Diário</div>
          <div class="challenge-item">Missão do Fim de Semana</div>
        </aside>
      </div>
    </div>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
  </body>
</html>
