<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-perfil.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Meu Perfil</h1>
        </div>

        <div class="profile-content">
            <div class="profile-image-container">
                <img src="RedaPlay.png" alt="Foto de Perfil" class="profile-image">
            </div>

            <h2>Informações do Usuário</h2>
            <div class="profile-info">
                <p><strong>Nome:</strong> Usuário Exemplo</p>
                <p><strong>Email:</strong> usuario.exemplo@email.com</p>
                <p><strong>Data de Criação:</strong> 01/01/2023</p>
            </div>

            <div class="profile-actions">
                <a href="#" class="profile-button edit">Editar Perfil</a>
                <a href="#" class="profile-button delete">Excluir Perfil</a>
            </div>

            <a href="#" class="back-button">Voltar</a>
        </div>
    </div>
</body>
</html>
